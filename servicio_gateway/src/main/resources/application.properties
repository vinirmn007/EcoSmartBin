# ========================
# GATEWAY — Puerto 8080
# ========================
server.port=8080
spring.application.name=servicio-gateway

# ========================
# Nodos del cluster Bully
# Se puede sobreescribir con la variable de entorno GATEWAY_NODE_URLS
# Ejemplo: GATEWAY_NODE_URLS=http://192.168.1.10:8081,http://192.168.1.11:8082,http://192.168.1.12:8083
# ========================
gateway.node-urls=${GATEWAY_NODE_URLS:${NODE_URLS:http://localhost:8081,http://localhost:8082,http://localhost:8083}}

# ========================
# Intervalo de polling al lider (ms)
# ========================
gateway.poll-interval-ms=3000

# ========================
# Logging
# ========================
logging.level.com.ecosmartbin.gateway=INFO
