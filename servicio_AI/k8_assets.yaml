apiVersion: apps/v1
kind: Deployment
metadata:
  name: garbage-classifier-deployment
  labels:
    app: garbage-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: garbage-classifier
  template:
    metadata:
      labels:
        app: garbage-classifier
    spec:
      containers:
      - name: classifier-api
        image: southamerica-west1-docker.pkg.dev/project-9cfd392e-d349-480a-bf9/assignment-repo/garbage-classifier:v1
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1500m"
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: garbage-classifier-service
spec:
  type: NodePort
  selector:
    app: garbage-classifier
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 32000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: garbage-classifier-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  defaultBackend:
    service:
      name: garbage-classifier-service
      port:
        number: 8080