name: EcoSmartBin CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # =======================================================
  # 1. INTEGRACION CONTINUA (CI) - Compilación y Pruebas
  # =======================================================
  backend-ci:
    name: Backend CI (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test Backend
        run: |
          cd Backend
          chmod +x mvnw
          ./mvnw clean test

  frontend-ci:
    name: Frontend CI (Flutter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.8' # Usando la misma versión del pubspec
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Run Tests
        run: |
          cd frontend
          flutter test

  # =======================================================
  # 2. DESPLIEGUE CONTINUO (CD) - AWS EC2 & S3
  # =======================================================
  backend-cd:
    name: Backend CD (Deploy to AWS EC2 via ECR)
    needs: backend-ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Necesario para cuentas AWS Academy / Educate
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'ecosmartbin-backend' }}
          IMAGE_TAG: latest
        run: |
          cd Backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY, ECR_REPOSITORY
          script: |
            # Autenticar Docker con Amazon ECR en la máquina EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION || 'us-east-1' }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            # Detener el contenedor anterior si está corriendo
            docker stop ecosmartbin-backend || true
            docker rm ecosmartbin-backend || true
            
            # Descargar la última imagen
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY || 'ecosmartbin-backend' }}:latest
            
            # Ejecutar el nuevo contenedor con las variables de entorno de base de datos
            docker run -d \
              --name ecosmartbin-backend \
              -p 8081:8081 \
              -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              -e SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI="${{ secrets.SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI }}" \
              -e SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
              -e SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}" \
              ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY || 'ecosmartbin-backend' }}:latest

  frontend-cd:
    name: Frontend CD (Deploy to Amazon S3)
    needs: frontend-ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Necesario para cuentas AWS Academy / Educate
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.8'
          channel: 'stable'
          cache: true

      - name: Build Web App
        run: |
          cd frontend
          flutter pub get
          flutter build web --release

      - name: Deploy to Amazon S3 Website Bucket
        run: |
          aws s3 sync frontend/build/web s3://${{ secrets.S3_BUCKET_NAME }} --delete
