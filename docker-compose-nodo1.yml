# ═══════════════════════════════════════════════════════════════════
#  docker-compose-nodo1.yml
#
#  COMPUTADORA 1 — Nodo Bully ID=1 (puerto 8081)
#
#  INSTRUCCIONES:
#  1. Averigua las IPs de las 3 computadoras en la red del switch.
#     Ejemplo: PC1=192.168.1.10 | PC2=192.168.1.11 | PC3=192.168.1.12
#
#  2. Edita las variables de entorno de abajo con esas IPs reales.
#
#  3. Corre en esta computadora:
#       docker-compose -f docker-compose-nodo1.yml up --build
# ═══════════════════════════════════════════════════════════════════

services:
  nodo1:
    build:
      context: ./servicio_puntos
      dockerfile: Dockerfile
    container_name: bully-nodo1
    ports:
      - "8081:8081"
    environment:
      # ──────────────────────────────────────────────────────────
      #  Identidad de este nodo
      # ──────────────────────────────────────────────────────────
      NODE_ID: "1"
      NODE_PORT: "8081"

      # ──────────────────────────────────────────────────────────
      #  IPs reales de las 3 computadoras en la red del switch
      #  CAMBIA las IPs por las de cada computadora
      # ──────────────────────────────────────────────────────────
      NODE_URLS: "http://192.168.1.10:8081,http://192.168.1.11:8082,http://192.168.1.12:8083"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/bully/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

    restart: unless-stopped

    networks:
      - bully-net

networks:
  bully-net:
    driver: bridge
