# ═══════════════════════════════════════════════════════════════════
#  docker-compose-nodo3.yml
#
#  COMPUTADORA 3 — Nodo Bully ID=3 (puerto 8083)
#
#  Este nodo tiene el ID MAS ALTO → sera el LIDER inicial.
#
#  INSTRUCCIONES:
#  1. Averigua las IPs de las 3 computadoras en la red del switch.
#     Ejemplo: PC1=192.168.1.10 | PC2=192.168.1.11 | PC3=192.168.1.12
#
#  2. Edita las variables de entorno de abajo con esas IPs reales.
#
#  3. Corre en esta computadora:
#       docker-compose -f docker-compose-nodo3.yml up --build
# ═══════════════════════════════════════════════════════════════════

services:
  nodo3:
    build:
      context: ./servicio_puntos
      dockerfile: Dockerfile
    container_name: bully-nodo3
    ports:
      - "8083:8083"
    environment:
      # ──────────────────────────────────────────────────────────
      #  Identidad de este nodo
      # ──────────────────────────────────────────────────────────
      NODE_ID: "3"
      NODE_PORT: "8083"

      # ──────────────────────────────────────────────────────────
      #  IPs reales de las 3 computadoras en la red del switch
      #  CAMBIA las IPs por las de cada computadora
      # ──────────────────────────────────────────────────────────
      NODE_URLS: "http://10.20.138.136:8081,http://10.20.138.100:8082,http://10.20.138.138:8083"

    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8083/api/bully/status" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

    restart: unless-stopped

    networks:
      - bully-net

networks:
  bully-net:
    driver: bridge
