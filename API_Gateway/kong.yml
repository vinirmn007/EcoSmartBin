_format_version: "3.0"
_transform: true

services:
  - name: user-service
    url: ${KONG_USER_SERVICE_URL|http://servicio_usuarios:8080}
    routes:
      - name: user-routes
        paths:
          - /auth
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - https://ecosmartbin2.web.app
        - http://localhost:8000
        - http://localhost:5000  # Por si corres Flutter local en otro puerto web
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-Type
        - Authorization
        - x-requested-with
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600