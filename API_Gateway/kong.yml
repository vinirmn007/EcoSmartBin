_format_version: "3.0"
_transform: true

services:
  # 1. Servicio de Usuarios
  - name: user-service
    protocol: https
    host: ecosmartbin-229724129072.southamerica-west1.run.app
    port: 443
    routes:
      - name: user-routes
        paths:
          - /auth
        strip_path: false
plugins:
  - name: cors
    config:
      origins:
        - https://ecosmartbin2.web.app
        - http://localhost:8000
        - http://localhost:5000
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-Type
        - Authorization
        - x-requested-with
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600