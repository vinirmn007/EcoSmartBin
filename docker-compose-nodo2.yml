# ═══════════════════════════════════════════════════════════════════
#  docker-compose-nodo2.yml
#
#  COMPUTADORA 2 — Nodo Bully ID=2 (puerto 8082)
#
#  INSTRUCCIONES:
#  1. Averigua las IPs de las 3 computadoras en la red del switch.
#
#  2. Edita las variables de entorno de abajo con esas IPs reales.
#
#  3. Corre en esta computadora:
#       docker-compose -f docker-compose-nodo2.yml up --build
# ═══════════════════════════════════════════════════════════════════

services:
  nodo2:
    build:
      context: ./servicio_puntos
      dockerfile: Dockerfile
    container_name: bully-nodo2
    ports:
      - "8082:8082"
    environment:
      # ──────────────────────────────────────────────────────────
      #  Identidad de este nodo
      # ──────────────────────────────────────────────────────────
      NODE_ID: "2"
      NODE_PORT: "8082"

      # ──────────────────────────────────────────────────────────
      #  IPs reales de las 3 computadoras en la red del switch
      #  CAMBIA las IPs por las de cada computadora
      # ──────────────────────────────────────────────────────────
      NODE_URLS: "http://192.168.110.127:8081,http://192.168.110.90:8082,http://192.168.1.12:8083"

    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8082/api/bully/status" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

    restart: unless-stopped

    networks:
      - bully-net

networks:
  bully-net:
    driver: bridge
