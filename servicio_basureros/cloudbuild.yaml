steps:
  # 0. Ejecutar pruebas unitarias (Python)
  - name: 'python:3.12-slim'
    dir: 'servicio_basureros'
    entrypoint: /bin/sh
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        pip install pytest
        pytest tests/

  # 1. Construir la imagen Docker usando el Dockerfile de este directorio
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'servicio_basureros'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA', '.']

  # 2. Subir la imagen a Google Container Registry (GCR)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA']

  # 3. Desplegar la imagen en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'

# Registra la imagen para que quede en el historial de Cloud Build
images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'

# Variables por defecto (puedes sobreescribirlas al crear el Trigger en GCP)
substitutions:
  _SERVICE_NAME: 'servicio-basureros' # El nombre que tendrá tu servicio en Cloud Run
  _REGION: 'us-central1'              # La región donde lo estás desplegando

options:
  logging: CLOUD_LOGGING_ONLY
