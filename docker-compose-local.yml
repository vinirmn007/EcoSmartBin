# ═══════════════════════════════════════════════════════════════════
#  docker-compose-local.yml
#
#  PRUEBA LOCAL — Los 3 nodos + Gateway en UNA SOLA computadora
#  (para probar antes de distribuir por el switch)
#
#  Corre con:
#       docker-compose -f docker-compose-local.yml up --build
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Nodo 1 (ID=1, puerto 8081) ─────────────────────────────────
  nodo1:
    build:
      context: ./servicio_puntos
      dockerfile: Dockerfile
    container_name: bully-nodo1
    ports:
      - "8081:8081"
    environment:
      NODE_ID: "1"
      NODE_PORT: "8081"
      NODE_URLS: "http://nodo1:8081,http://nodo2:8082,http://nodo3:8083"
    networks:
      - bully-net
    restart: unless-stopped

  # ── Nodo 2 (ID=2, puerto 8082) ─────────────────────────────────
  nodo2:
    build:
      context: ./servicio_puntos
      dockerfile: Dockerfile
    container_name: bully-nodo2
    ports:
      - "8082:8082"
    environment:
      NODE_ID: "2"
      NODE_PORT: "8082"
      NODE_URLS: "http://nodo1:8081,http://nodo2:8082,http://nodo3:8083"
    networks:
      - bully-net
    restart: unless-stopped

  # ── Nodo 3 (ID=3, puerto 8083) — LIDER INICIAL ─────────────────
  nodo3:
    build:
      context: ./servicio_puntos
      dockerfile: Dockerfile
    container_name: bully-nodo3
    ports:
      - "8083:8083"
    environment:
      NODE_ID: "3"
      NODE_PORT: "8083"
      NODE_URLS: "http://nodo1:8081,http://nodo2:8082,http://nodo3:8083"
    networks:
      - bully-net
    restart: unless-stopped

  # ── Gateway (puerto 8080) ───────────────────────────────────────
  gateway:
    build:
      context: ./servicio_gateway
      dockerfile: Dockerfile
    container_name: bully-gateway
    ports:
      - "8080:8080"
    environment:
      # En local usamos los nombres de servicio de Docker como hostnames
      NODE_URLS: "http://nodo1:8081,http://nodo2:8082,http://nodo3:8083"
    depends_on:
      - nodo1
      - nodo2
      - nodo3
    networks:
      - bully-net
    restart: unless-stopped

networks:
  bully-net:
    driver: bridge
