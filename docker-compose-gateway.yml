# ═══════════════════════════════════════════════════════════════════
#  docker-compose-gateway.yml
#
#  COMPUTADORA DEL GATEWAY — Puerto 8080
#
#  El Gateway puede correr en cualquier computadora del switch.
#  El frontend Flutter se conecta SOLO al Gateway.
#
#  INSTRUCCIONES:
#  1. Averigua las IPs de las 3 computadoras con los nodos Bully.
#     Ejemplo: PC1=192.168.1.10 | PC2=192.168.1.11 | PC3=192.168.1.12
#
#  2. Edita NODE_URLS abajo con esas IPs reales.
#
#  3. Corre en esta computadora:
#       docker-compose -f docker-compose-gateway.yml up --build
#
#  4. El frontend apunta a: http://<IP-DE-ESTA-PC>:8080
# ═══════════════════════════════════════════════════════════════════

services:
  gateway:
    build:
      context: ./servicio_gateway
      dockerfile: Dockerfile
    container_name: bully-gateway
    ports:
      - "8080:8080"
    environment:
      # ──────────────────────────────────────────────────────────
      #  URLs de los 3 nodos Bully con sus IPs reales en la red
      #  CAMBIA las IPs por las de cada computadora del switch
      # ──────────────────────────────────────────────────────────
      NODE_URLS: "http://192.168.1.10:8081,http://192.168.1.11:8082,http://192.168.1.12:8083"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/gateway/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

    restart: unless-stopped

    networks:
      - bully-net

networks:
  bully-net:
    driver: bridge
