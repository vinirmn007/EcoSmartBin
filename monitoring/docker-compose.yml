version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090" # Solo acceder internamente o restringido por IP en GCE

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000" # Exponer este puerto en el Firewall de Google Cloud
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin_secure_password}

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      # Data source URL de Supabase (usando la cadena de conexión estándar o de pooler de Supabase)
      # El formato es: postgresql://[user]:[password]@[host]:[port]/[database]?sslmode=disable
      - DATA_SOURCE_NAME=${SUPABASE_DB_URL}
    ports:
      - "9187:9187"

volumes:
  prometheus_data:
  grafana_data:
