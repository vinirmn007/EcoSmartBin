<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="EcoSmartBin - Sistema inteligente de gestión de residuos con IA. Recicla, acumula puntos y contribuye al medio ambiente.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="EcoSmartBin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>EcoSmartBin</title>
  <link rel="manifest" href="manifest.json">

  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    /* Premium Loading screen styles */
    body {
      margin: 0;
      padding: 0;
      background-color: #050505;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0B130E 0%, #050505 100%);
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Futuristic glowing spinner */
    .glowing-spinner-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 40px;
    }

    .glowing-spinner-track {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.03);
    }

    .glowing-spinner-thumb {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top: 4px solid #10B981;
      border-right: 4px solid #10B981;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.35);
    }

    .glowing-spinner-inner {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse-scale 2s ease-in-out infinite;
    }

    .glowing-spinner-inner svg {
      width: 32px;
      height: 32px;
      fill: #10B981;
      filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.6));
    }

    .loading-title {
      color: #FFFFFF;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.8px;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .loading-subtitle {
      color: #E2E8F0;
      opacity: 0.6;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
      margin-bottom: 24px;
      animation: pulse-text 1.5s ease-in-out infinite;
    }

    .loading-bar-container {
      width: 160px;
      height: 3px;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      border: 0.5px solid rgba(255, 255, 255, 0.05);
    }

    .loading-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #10B981, #6366F1);
      border-radius: 10px;
      transform: translateX(-100%);
      animation: loading 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }

      50% {
        transform: translateX(0%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    @keyframes pulse-scale {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    @keyframes pulse-text {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 0.8;
      }
    }
  </style>
</head>

<body>
  <!-- Loading screen visible while Flutter initializes -->
  <div id="loading-screen">
    <div class="loader-container">
      <div class="glowing-spinner-wrapper">
        <div class="glowing-spinner-track"></div>
        <div class="glowing-spinner-thumb"></div>
        <div class="glowing-spinner-inner">
          <img src="favicon.png" alt="EcoSmartBin Logo" style="width: 38px; height: 38px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.6));">
        </div>
      </div>
      <div class="loading-title">EcoSmartBin</div>
      <div class="loading-subtitle">Cargando experiencia ecológica...</div>
      <div class="loading-bar-container">
        <div class="loading-bar"></div>
      </div>
    </div>
  </div>

  <script>
    // Remove loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loading-screen');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function () { loader.remove(); }, 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
